<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitchenOS</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- =========================================================================
     IKON-SPRITE (9-bosqich): barcha platformada ishlatiladigan chiziqli
     ikonlarning yagona manbasi. Har bir <symbol> 24x24 grid, 1.8px chiziq
     qalinligida chizilgan (Design Tokens bo'limidagi .icon klassiga qarang).
     Yangi ikon kerak bo'lsa — shu yerga yangi <symbol id="icon-..."> qo'shiladi,
     boshqa joyga emas (yagona manba printsipi buziladi).
     ========================================================================= -->
<svg id="icon-sprite" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <symbol id="icon-restaurant" viewBox="0 0 24 24">
    <path d="M7 2v6a2 2 0 0 1-2 2M7 2v18M4 2v4"/>
    <path d="M17 2c-2.1 0-3.7 2.4-3.7 5.6 0 2.4 1.1 4.4 2.7 5.3V20"/>
  </symbol>
  <symbol id="icon-edit" viewBox="0 0 24 24">
    <path d="M12 20h9"/>
    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
  </symbol>
  <symbol id="icon-check" viewBox="0 0 24 24">
    <path d="M20 6 9 17l-5-5"/>
  </symbol>
  <symbol id="icon-check-circle" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"/>
    <path d="m8.2 12.3 2.6 2.6 5-5.2"/>
  </symbol>
  <symbol id="icon-x" viewBox="0 0 24 24">
    <path d="M18 6 6 18"/>
    <path d="M6 6l12 12"/>
  </symbol>
  <symbol id="icon-trash" viewBox="0 0 24 24">
    <path d="M3 6h18"/>
    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6"/>
    <path d="M14 11v6"/>
  </symbol>
  <symbol id="icon-x-circle" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"/>
    <path d="m9.5 9.5 5 5"/>
    <path d="m14.5 9.5-5 5"/>
  </symbol>
  <symbol id="icon-box" viewBox="0 0 24 24">
    <path d="M21 8 12 3 3 8l9 5 9-5Z"/>
    <path d="M3 8v8l9 5 9-5V8"/>
    <path d="M12 13v8"/>
  </symbol>
  <symbol id="icon-wallet" viewBox="0 0 24 24">
    <path d="M3 7.5A2 2 0 0 1 5 5.5h13a1 1 0 0 1 1 1V9"/>
    <path d="M3 7.5v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6.5a2 2 0 0 0-2-2H6"/>
    <circle cx="16.3" cy="14" r="1.2"/>
  </symbol>
  <symbol id="icon-ai" viewBox="0 0 24 24">
    <rect x="5" y="8" width="14" height="10" rx="3"/>
    <path d="M12 8V4"/>
    <circle cx="12" cy="3" r="1.1"/>
    <circle cx="9.2" cy="13" r="1.1"/>
    <circle cx="14.8" cy="13" r="1.1"/>
    <path d="M9 17h6"/>
  </symbol>
  <symbol id="icon-users" viewBox="0 0 24 24">
    <circle cx="9" cy="8" r="3.2"/>
    <path d="M3.3 20a5.7 5.7 0 0 1 11.4 0"/>
    <circle cx="17.2" cy="9" r="2.5"/>
    <path d="M15.8 13.3a4.6 4.6 0 0 1 4.9 4.3"/>
  </symbol>
  <symbol id="icon-link" viewBox="0 0 24 24">
    <path d="M9.5 14.5 14.5 9.5"/>
    <path d="M11 6.3 13 4.3a3.5 3.5 0 0 1 5 5l-2 2"/>
    <path d="M13 17.7 11 19.7a3.5 3.5 0 0 1-5-5l2-2"/>
  </symbol>
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <path d="M12 3 2 21h20L12 3Z"/>
    <path d="M12 10v5"/>
    <circle cx="12" cy="18" r="0.9" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="icon-info" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 11v6"/>
    <circle cx="12" cy="7.5" r="0.9" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="icon-building" viewBox="0 0 24 24">
    <rect x="4" y="3" width="16" height="18" rx="1"/>
    <path d="M8 7h2M14 7h2M8 11h2M14 11h2M8 15h2M14 15h2"/>
    <path d="M10 21v-4h4v4"/>
  </symbol>
  <symbol id="icon-clipboard" viewBox="0 0 24 24">
    <rect x="5" y="4" width="14" height="17" rx="2"/>
    <path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/>
    <path d="M8 10h8M8 14h8M8 18h5"/>
  </symbol>
  <symbol id="icon-scooter" viewBox="0 0 24 24">
    <circle cx="6" cy="18" r="2.3"/>
    <circle cx="18" cy="18" r="2.3"/>
    <path d="M6 18h6l2-6h4"/>
    <path d="M12 12 10 6H7"/>
    <path d="M14 6h3"/>
  </symbol>
  <symbol id="icon-trophy" viewBox="0 0 24 24">
    <path d="M7 4h10v4a5 5 0 0 1-10 0V4Z"/>
    <path d="M7 5H4a3 3 0 0 0 3 5"/>
    <path d="M17 5h3a3 3 0 0 1-3 5"/>
    <path d="M12 13v4"/>
    <path d="M8 21h8"/>
    <path d="M9 21v-2a3 3 0 0 1 3-3 3 3 0 0 1 3 3v2"/>
  </symbol>
  <symbol id="icon-star" viewBox="0 0 24 24">
    <path d="M12 3.5 14.6 9l6 .9-4.3 4.2 1 6-5.3-2.8L6.7 20l1-6L3.4 9.9l6-.9L12 3.5Z"/>
  </symbol>
  <symbol id="icon-image" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="16" rx="2"/>
    <circle cx="9" cy="10" r="1.8"/>
    <path d="m4 17 5.5-5.5a1.5 1.5 0 0 1 2.1 0L18 18"/>
  </symbol>
  <symbol id="icon-heart" viewBox="0 0 24 24">
    <path d="M12 20.5S3.5 15 3.5 9.2A4.7 4.7 0 0 1 12 6.4a4.7 4.7 0 0 1 8.5 2.8C20.5 15 12 20.5 12 20.5Z"/>
  </symbol>
  <symbol id="icon-pin" viewBox="0 0 24 24">
    <path d="M12 21s7-6.5 7-11.5A7 7 0 0 0 5 9.5C5 14.5 12 21 12 21Z"/>
    <circle cx="12" cy="9.5" r="2.3"/>
  </symbol>
  <symbol id="icon-card" viewBox="0 0 24 24">
    <rect x="3" y="5" width="18" height="14" rx="2"/>
    <path d="M3 10h18"/>
    <path d="M7 15h4"/>
  </symbol>
  <symbol id="icon-wifi-off" viewBox="0 0 24 24">
    <path d="M2 2l20 20"/>
    <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
    <path d="M5 12.5a10 10 0 0 1 3.5-2.3"/>
    <path d="M12.5 8.05A10 10 0 0 1 19 12.5"/>
    <path d="M1.5 8.5a15 15 0 0 1 4.4-3"/>
    <path d="M18.1 5.5A15 15 0 0 1 22.5 8.5"/>
    <path d="M12 20.5h.01"/>
  </symbol>
  <symbol id="icon-lock" viewBox="0 0 24 24">
    <rect x="5" y="11" width="14" height="10" rx="2"/>
    <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    <circle cx="12" cy="15.5" r="1.2" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="icon-refresh" viewBox="0 0 24 24">
    <path d="M3 11a9 9 0 0 1 15.3-5.3L21 8"/>
    <path d="M21 3v5h-5"/>
    <path d="M21 13a9 9 0 0 1-15.3 5.3L3 16"/>
    <path d="M3 21v-5h5"/>
  </symbol>
  <symbol id="icon-trending-up" viewBox="0 0 24 24">
    <path d="M3 17l6-6 4 4 8-8"/>
    <path d="M15 7h6v6"/>
  </symbol>
  <symbol id="icon-send" viewBox="0 0 24 24">
    <path d="M22 2L11 13"/>
    <path d="M22 2l-7 20-4-9-9-4 20-7Z"/>
  </symbol>

  <!-- 2-bosqich: KitchenOS bosh sahifa uchun qo'shilgan ikonlar -->
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <path d="M4 6h16"/>
    <path d="M4 12h16"/>
    <path d="M4 18h16"/>
  </symbol>
  <symbol id="icon-bell" viewBox="0 0 24 24">
    <path d="M6 9a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c.5-.5 2-2 2-6Z"/>
    <path d="M10 19a2 2 0 0 0 4 0"/>
  </symbol>
  <symbol id="icon-calendar" viewBox="0 0 24 24">
    <rect x="4" y="5" width="16" height="15" rx="2"/>
    <path d="M4 10h16"/>
    <path d="M8 3v4M16 3v4"/>
  </symbol>
  <symbol id="icon-chef-hat" viewBox="0 0 24 24">
    <path d="M6 11a4.5 4.5 0 0 1 2-8.3A4 4 0 0 1 12 4a4 4 0 0 1 4-1.3A4.5 4.5 0 0 1 18 11"/>
    <path d="M6 11h12v3a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-3Z"/>
    <path d="M8 21v-5M16 21v-5"/>
  </symbol>
  <symbol id="icon-cloche" viewBox="0 0 24 24">
    <path d="M3 17a9 9 0 0 1 18 0"/>
    <path d="M2 17h20"/>
    <circle cx="12" cy="6" r="1" fill="currentColor" stroke="none"/>
    <path d="M12 7v2"/>
  </symbol>
  <symbol id="icon-file-plus" viewBox="0 0 24 24">
    <path d="M7 3h7l4 4v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/>
    <path d="M14 3v4h4"/>
    <path d="M12 12v6M9 15h6"/>
  </symbol>
  <symbol id="icon-clock" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 7v5l3.5 2"/>
  </symbol>
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>
  </symbol>
  <symbol id="icon-bar-chart" viewBox="0 0 24 24">
    <path d="M4 20V10M12 20V4M20 20v-7"/>
    <path d="M2 20h20"/>
  </symbol>
  <symbol id="icon-store" viewBox="0 0 24 24">
    <path d="M4 9 5 4h14l1 5"/>
    <path d="M4 9v11h16V9"/>
    <path d="M4 9a2.5 2.5 0 0 0 5 0 2.5 2.5 0 0 0 5 0 2.5 2.5 0 0 0 5 0"/>
    <path d="M10 20v-6h4v6"/>
  </symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24">
    <path d="M12 5v14M5 12h14"/>
  </symbol>
  <symbol id="icon-user" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="3.5"/>
    <path d="M5 20a7 7 0 0 1 14 0"/>
  </symbol>
  <symbol id="icon-home" viewBox="0 0 24 24">
    <path d="M4 11 12 4l8 7"/>
    <path d="M6 10v10h12V10"/>
    <path d="M10 20v-6h4v6"/>
  </symbol>

  <!-- Admin panel qulayligi (qidiruv maydoni) uchun qo'shilgan ikon -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="7"/>
    <path d="m20 20-3.8-3.8"/>
  </symbol>

  <!-- Profil sahifasidagi bosiladigan (accordion) bo'limlar uchun ikon -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24">
    <path d="m6 9 6 6 6-6"/>
  </symbol>

  <!-- 38-bosqich: Dark/Light almashtirish tugmasi uchun ikonlar -->
  <symbol id="icon-moon" viewBox="0 0 24 24">
    <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"/>
  </symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4.5"/>
    <path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>
  </symbol>

  <!-- 40-bosqich: mijoz "Buyurtmalarim"da tezkor takroriy buyurtma tugmasi uchun -->
  <symbol id="icon-repeat" viewBox="0 0 24 24">
    <path d="M4 12a8 8 0 0 1 8-8h6M18 4v4h-4"/>
    <path d="M20 12a8 8 0 0 1-8 8H6M6 20v-4h4"/>
  </symbol>

  <!-- 52-54-bosqich: DB zaxira (backup) bo'limi uchun yuklab olish/yuklash ikonlari -->
  <symbol id="icon-download" viewBox="0 0 24 24">
    <path d="M12 3v12"/>
    <path d="m7 10 5 5 5-5"/>
    <path d="M4 19h16"/>
  </symbol>
  <symbol id="icon-upload" viewBox="0 0 24 24">
    <path d="M12 21V9"/>
    <path d="m7 14 5-5 5 5"/>
    <path d="M4 19h16"/>
  </symbol>
</svg>

<div id="appHeader" class="app-header hidden"></div>
<div id="app"><div class="xato">Tekshirilmoqda...</div></div>

<script src="app.js"></script>
</body>
</html>
