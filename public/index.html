<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .salom {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .xato {
    font-size: 16px;
    color: #d33;
    max-width: 320px;
    line-height: 1.5;
  }

  /* ---- Admin panel ---- */
  .panel {
    width: 100%;
    max-width: 420px;
    text-align: left;
  }
  .kartochka {
    background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    border-radius: 14px;
    padding: 16px;
    margin-top: 20px;
  }
  .kartochka h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #ffffff);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:active { opacity: 0.85; }
  .btn.ikkinchi {
    background: transparent;
    border: 1px solid #ccc;
    color: var(--tg-theme-text-color, #111111);
  }
  .btn.xavfli {
    background: #e5484d;
  }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-row .btn { flex: 1; }

  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    margin-bottom: 10px;
  }

  .owner-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .owner-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--tg-theme-bg-color, #ffffff);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
  }
  .owner-item .owner-id { font-weight: 600; word-break: break-all; }
  .owner-item .owner-username { font-size: 12px; opacity: 0.6; }
  .owner-item button {
    border: none;
    background: none;
    color: #e5484d;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
  }
  .bosh { font-size: 13px; opacity: 0.6; margin-top: 4px; }
  .owner-item .owner-expiry { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .owner-item .owner-price { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .owner-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .badge.paid { background: #e3f7e9; color: #2fa84f; }
  .badge.unpaid { background: #fdeaea; color: #d33; }

  textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    font-family: inherit;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    margin-bottom: 10px;
    resize: vertical;
    min-height: 60px;
  }
  label.field-label { display: block; font-size: 13px; opacity: 0.7; margin: 4px 0 6px; }
  .logo-preview {
    width: 64px; height: 64px; border-radius: 12px; object-fit: cover;
    background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    margin-bottom: 10px;
  }
  .profile-view { display: flex; gap: 12px; align-items: center; }
  .profile-view .info { flex: 1; }
  .profile-row { font-size: 14px; margin-top: 4px; }
  .profile-row b { opacity: 0.7; font-weight: 600; }
  .role-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--tg-theme-secondary-bg-color, #eef2ff);
    color: var(--tg-theme-button-color, #2ea6ff);
  }
  select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    margin-bottom: 10px;
  }
  .link-box {
    display: flex;
    gap: 6px;
    align-items: center;
    background: var(--tg-theme-bg-color, #ffffff);
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 13px;
    word-break: break-all;
  }
  .link-box span { flex: 1; }
  .link-box button {
    border: none;
    border-radius: 8px;
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #ffffff);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .xabar { font-size: 13px; margin-top: 8px; min-height: 16px; }
  .xabar.ok { color: #2fa84f; }
  .xabar.err { color: #d33; }

  /* ---- Tasdiqlash oynasi (modal) ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  .modal {
    background: var(--tg-theme-bg-color, #ffffff);
    border-radius: 14px;
    padding: 20px;
    width: 100%;
    max-width: 340px;
    text-align: left;
  }
  .modal h3 { font-size: 16px; margin-bottom: 8px; }
  .modal p { font-size: 14px; opacity: 0.8; line-height: 1.4; margin-bottom: 16px; word-break: break-all; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"><div class="xato">Tekshirilmoqda...</div></div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  const appEl = document.getElementById('app');
  const initData = tg && tg.initData;

  function ekran(html) {
    appEl.innerHTML = html;
  }

  async function apiPost(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return r.json();
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---- Admin panelini chizish ----
  function expiryText(o) {
    if (!o.expiresAt) return 'Doimiy ruxsat';
    const ms = new Date(o.expiresAt).getTime() - Date.now();
    if (ms <= 0) return 'Muddati tugagan';
    const days = Math.ceil(ms / 86400000);
    return `${days} kun qoldi`;
  }

  function renderAdminPanel(owners) {
    const ownersHtml = owners.length
      ? owners.map(o => `
          <div class="owner-item">
            <div>
              <div class="owner-id">${escapeHtml(o.id)}</div>
              ${o.username ? `<div class="owner-username">@${escapeHtml(o.username)}</div>` : ''}
              ${o.profile && o.profile.name ? `<div class="owner-username">🍽 ${escapeHtml(o.profile.name)}</div>` : `<div class="owner-username">Profil to'ldirilmagan</div>`}
              <div class="owner-expiry">${escapeHtml(expiryText(o))}</div>
              <div class="owner-price" data-edit-price="${escapeHtml(o.id)}" style="cursor:pointer; text-decoration:underline dotted;">
                Obuna narxi: ${o.price ? escapeHtml(String(o.price)) + ' so\'m/oy' : 'kiritilmagan'} ✏️
              </div>
            </div>
            <div class="owner-actions">
              <span class="badge ${o.paid ? 'paid' : 'unpaid'}" data-toggle-paid="${escapeHtml(o.id)}" data-paid="${o.paid ? '1' : '0'}" style="cursor:pointer;">
                ${o.paid ? "To'langan ✅" : "To'lanmagan ❌"}
              </span>
              <button data-remove-id="${escapeHtml(o.id)}">O'chirish</button>
            </div>
          </div>
        `).join('')
      : `<div class="bosh">Hozircha do'kon egalari yo'q.</div>`;

    ekran(`
      <div class="panel">
        <div class="salom">Salom, admin</div>
        <div class="kartochka">
          <h2>Bir martalik taklif havolasi</h2>
          <div class="bosh">Havolani do'kon egasiga yuboring. U botni ochganda so'rovi sizga keladi — Telegramda tugma bosib, necha kunga ruxsat berishni tanlaysiz.</div>
          <button class="btn" id="createInviteBtn" style="margin-top:10px;">Havola yaratish</button>
          <div id="inviteBoxWrap"></div>
          <div class="xabar" id="inviteMsg"></div>
        </div>
        <div class="kartochka">
          <h2>Do'kon egasini ID orqali qo'shish</h2>
          <input type="text" id="ownerInput" placeholder="Telegram ID, @username yoki t.me havolasi">
          <input type="text" id="ownerDaysInput" placeholder="Necha kunga (bo'sh qoldirsangiz — doimiy)" inputmode="numeric">
          <input type="text" id="ownerPriceInput" placeholder="Obuna narxi, so'm/oy (ixtiyoriy)" inputmode="numeric">
          <label style="display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:10px;">
            <input type="checkbox" id="ownerPaidInput" style="width:auto; margin:0;"> To'lov qabul qilindi
          </label>
          <button class="btn" id="addOwnerBtn">Do'kon egasi qo'shish</button>
          <div class="xabar" id="addMsg"></div>
        </div>
        <div class="kartochka">
          <h2>Ruxsat berilgan do'kon egalari</h2>
          <div class="owner-list" id="ownerList">${ownersHtml}</div>
        </div>
      </div>
      <div class="overlay hidden" id="confirmOverlay">
        <div class="modal">
          <h3>Tasdiqlaysizmi?</h3>
          <p id="confirmText"></p>
          <div class="btn-row">
            <button class="btn ikkinchi" id="confirmCancel">Yo'q</button>
            <button class="btn" id="confirmOk">Ha, qo'shish</button>
          </div>
        </div>
      </div>
    `);

    document.getElementById('createInviteBtn').addEventListener('click', async () => {
      const msgEl = document.getElementById('inviteMsg');
      const wrap = document.getElementById('inviteBoxWrap');
      msgEl.textContent = 'Yaratilmoqda...';
      msgEl.className = 'xabar';
      const res = await apiPost('/api/create-invite', { initData });
      if (!res.ok) {
        msgEl.textContent = res.reason || 'Xatolik yuz berdi.';
        msgEl.className = 'xabar err';
        wrap.innerHTML = '';
        return;
      }
      msgEl.textContent = '';
      wrap.innerHTML = `
        <div class="link-box">
          <span id="inviteLinkText">${escapeHtml(res.link)}</span>
          <button id="copyInviteBtn">Nusxalash</button>
        </div>
      `;
      document.getElementById('copyInviteBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(res.link).then(() => {
          msgEl.textContent = 'Havola nusxalandi.';
          msgEl.className = 'xabar ok';
        }).catch(() => {
          msgEl.textContent = 'Nusxalab bo\'lmadi, havolani qo\'lda ko\'chiring.';
          msgEl.className = 'xabar err';
        });
      });
    });

    document.getElementById('addOwnerBtn').addEventListener('click', () => {
      const val = document.getElementById('ownerInput').value.trim();
      const daysVal = document.getElementById('ownerDaysInput').value.trim();
      const priceVal = document.getElementById('ownerPriceInput').value.trim();
      const paidVal = document.getElementById('ownerPaidInput').checked;
      const msgEl = document.getElementById('addMsg');
      msgEl.textContent = '';
      msgEl.className = 'xabar';
      if (!val) {
        msgEl.textContent = 'Iltimos, ID yoki username kiriting.';
        msgEl.className = 'xabar err';
        return;
      }
      if (daysVal && (!/^\d+$/.test(daysVal) || parseInt(daysVal, 10) <= 0)) {
        msgEl.textContent = 'Kun soni musbat butun son bo\'lishi kerak, yoki bo\'sh qoldiring.';
        msgEl.className = 'xabar err';
        return;
      }
      if (priceVal && (!/^\d+$/.test(priceVal) || parseInt(priceVal, 10) < 0)) {
        msgEl.textContent = 'Narx musbat son bo\'lishi kerak, yoki bo\'sh qoldiring.';
        msgEl.className = 'xabar err';
        return;
      }
      const muddat = daysVal ? `${daysVal} kunga` : 'doimiy';
      const narxMatn = priceVal ? `, obuna narxi ${priceVal} so'm/oy` : '';
      document.getElementById('confirmText').textContent =
        `"${val}" ni do'kon egasi sifatida qo'shib, ${muddat} mini appga kirish huquqini berasizmi${narxMatn}?`;
      document.getElementById('confirmOverlay').classList.remove('hidden');

      document.getElementById('confirmCancel').onclick = () => {
        document.getElementById('confirmOverlay').classList.add('hidden');
      };
      document.getElementById('confirmOk').onclick = async () => {
        document.getElementById('confirmOverlay').classList.add('hidden');
        msgEl.textContent = 'Qo\'shilmoqda...';
        msgEl.className = 'xabar';
        const res = await apiPost('/api/add-owner', {
          initData, input: val, days: daysVal || null,
          price: priceVal || null, paid: paidVal
        });
        if (res.ok) {
          msgEl.textContent = 'Muvaffaqiyatli qo\'shildi.';
          msgEl.className = 'xabar ok';
          document.getElementById('ownerInput').value = '';
          document.getElementById('ownerDaysInput').value = '';
          document.getElementById('ownerPriceInput').value = '';
          document.getElementById('ownerPaidInput').checked = false;
          loadOwnersAndRender();
        } else {
          msgEl.textContent = res.reason || 'Xatolik yuz berdi.';
          msgEl.className = 'xabar err';
        }
      };
    });

    document.getElementById('ownerList').addEventListener('click', async (e) => {
      const removeId = e.target.getAttribute('data-remove-id');
      if (removeId) {
        e.target.disabled = true;
        await apiPost('/api/remove-owner', { initData, id: removeId });
        loadOwnersAndRender();
        return;
      }

      const toggleId = e.target.getAttribute('data-toggle-paid');
      if (toggleId) {
        const current = e.target.getAttribute('data-paid') === '1';
        await apiPost('/api/update-owner-billing', { initData, id: toggleId, paid: !current });
        loadOwnersAndRender();
        return;
      }

      const editId = e.target.getAttribute('data-edit-price');
      if (editId && !e.target.querySelector('input')) {
        e.target.innerHTML = `
          <input type="text" inputmode="numeric" placeholder="Yangi narx" style="margin:0; padding:6px 8px; font-size:13px;" data-price-field="${escapeHtml(editId)}">
          <button data-save-price="${escapeHtml(editId)}" style="border:none; border-radius:8px; background:var(--tg-theme-button-color,#2ea6ff); color:var(--tg-theme-button-text-color,#fff); font-size:12px; padding:6px 10px; margin-left:6px;">Saqlash</button>
        `;
      }
    });

    document.getElementById('ownerList').addEventListener('click', async (e) => {
      const saveId = e.target.getAttribute('data-save-price');
      if (!saveId) return;
      const input = document.querySelector(`input[data-price-field="${saveId}"]`);
      const val = input ? input.value.trim() : '';
      if (val && (!/^\d+$/.test(val) || parseInt(val, 10) < 0)) {
        alert('Narx musbat son bo\'lishi kerak.');
        return;
      }
      await apiPost('/api/update-owner-billing', { initData, id: saveId, price: val || 0 });
      loadOwnersAndRender();
    });
  }

  // ---- Do'kon egasi: profilni to'ldirish formasi ----
  function renderProfileForm(existing) {
    const p = existing || {};
    ekran(`
      <div class="panel">
        <div class="salom">${existing ? 'Profilni tahrirlash' : 'Profilni to\'ldiring'}</div>
        <div class="bosh">${existing ? 'Ma\'lumotlaringizni yangilang.' : 'Ishni boshlash uchun oshxonangiz haqida ma\'lumot kiriting.'}</div>
        <div class="kartochka">
          <label class="field-label">Oshxona nomi *</label>
          <input type="text" id="pName" placeholder="Masalan: Osh Markazi" value="${escapeHtml(p.name || '')}">
          <label class="field-label">Manzil *</label>
          <input type="text" id="pAddress" placeholder="Shahar, ko'cha, uy" value="${escapeHtml(p.address || '')}">
          <label class="field-label">Telefon *</label>
          <input type="text" id="pPhone" placeholder="+998901234567" value="${escapeHtml(p.phone || '')}">
          <label class="field-label">Ish vaqti</label>
          <input type="text" id="pWorkHours" placeholder="09:00 - 23:00" value="${escapeHtml(p.workHours || '')}">
          <label class="field-label">Logotip havolasi (ixtiyoriy, rasm linki)</label>
          <input type="text" id="pLogo" placeholder="https://..." value="${escapeHtml(p.logoUrl || '')}">
          <button class="btn" id="saveProfileBtn" style="margin-top:6px;">Saqlash</button>
          <div class="xabar" id="profileMsg"></div>
        </div>
      </div>
    `);

    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const msgEl = document.getElementById('profileMsg');
      const body = {
        initData,
        name: document.getElementById('pName').value.trim(),
        address: document.getElementById('pAddress').value.trim(),
        phone: document.getElementById('pPhone').value.trim(),
        workHours: document.getElementById('pWorkHours').value.trim(),
        logoUrl: document.getElementById('pLogo').value.trim()
      };
      msgEl.textContent = 'Saqlanmoqda...';
      msgEl.className = 'xabar';
      const res = await apiPost('/api/save-profile', body);
      if (!res.ok) {
        msgEl.textContent = res.reason || 'Xatolik yuz berdi.';
        msgEl.className = 'xabar err';
        return;
      }
      renderProfileView(res.profile);
    });
  }

  // ---- Do'kon egasi: to'ldirilgan profilni ko'rsatish ----
  const ROLE_LABELS = { kassir: 'Kassir', oshpaz: 'Oshpaz', sklad: 'Sklad mas\'uli', dostavka: 'Dostavkachi' };

  function staffListHtml(staff) {
    if (!staff || !staff.length) return `<div class="bosh">Hozircha xodimlar yo'q.</div>`;
    return staff.map(s => `
      <div class="owner-item">
        <div>
          <div class="owner-id">${escapeHtml(s.id)}</div>
          ${s.username ? `<div class="owner-username">@${escapeHtml(s.username)}</div>` : ''}
          <div class="owner-expiry"><span class="role-badge">${escapeHtml(ROLE_LABELS[s.role] || s.role)}</span></div>
        </div>
        <button data-remove-staff-id="${escapeHtml(s.id)}">O'chirish</button>
      </div>
    `).join('');
  }

  function renderProfileView(profile) {
    ekran(`
      <div class="panel">
        <div class="salom">Salom, ${escapeHtml(profile.name)}</div>
        <div class="kartochka">
          <div class="profile-view">
            ${profile.logoUrl ? `<img class="logo-preview" src="${escapeHtml(profile.logoUrl)}" onerror="this.style.display='none'">` : ''}
            <div class="info">
              <div class="profile-row"><b>Manzil:</b> ${escapeHtml(profile.address)}</div>
              <div class="profile-row"><b>Telefon:</b> ${escapeHtml(profile.phone)}</div>
              ${profile.workHours ? `<div class="profile-row"><b>Ish vaqti:</b> ${escapeHtml(profile.workHours)}</div>` : ''}
            </div>
          </div>
          <button class="btn ikkinchi" id="editProfileBtn" style="margin-top:14px;">Profilni tahrirlash</button>
        </div>
        <div class="kartochka">
          <h2>Xodim qo'shish</h2>
          <input type="text" id="staffInput" placeholder="Telegram ID, @username yoki t.me havolasi">
          <select id="staffRoleInput">
            <option value="kassir">Kassir</option>
            <option value="oshpaz">Oshpaz</option>
            <option value="sklad">Sklad mas'uli</option>
            <option value="dostavka">Dostavkachi</option>
          </select>
          <button class="btn" id="addStaffBtn">Xodim qo'shish</button>
          <div class="xabar" id="staffMsg"></div>
        </div>
        <div class="kartochka">
          <h2>Xodimlar ro'yxati</h2>
          <div class="owner-list" id="staffList"><div class="bosh">Yuklanmoqda...</div></div>
        </div>
        <div class="bosh" style="margin-top:12px;">Keyingi bo'limlar (kassir menyusi, sklad, hisobotlar) tez orada shu yerga qo'shiladi.</div>
      </div>
    `);
    document.getElementById('editProfileBtn').addEventListener('click', () => renderProfileForm(profile));

    document.getElementById('addStaffBtn').addEventListener('click', async () => {
      const val = document.getElementById('staffInput').value.trim();
      const role = document.getElementById('staffRoleInput').value;
      const msgEl = document.getElementById('staffMsg');
      if (!val) {
        msgEl.textContent = 'Iltimos, ID yoki username kiriting.';
        msgEl.className = 'xabar err';
        return;
      }
      msgEl.textContent = 'Qo\'shilmoqda...';
      msgEl.className = 'xabar';
      const res = await apiPost('/api/add-staff', { initData, input: val, role });
      if (res.ok) {
        msgEl.textContent = 'Xodim qo\'shildi.';
        msgEl.className = 'xabar ok';
        document.getElementById('staffInput').value = '';
        loadStaffAndRender();
      } else {
        msgEl.textContent = res.reason || 'Xatolik yuz berdi.';
        msgEl.className = 'xabar err';
      }
    });

    document.getElementById('staffList').addEventListener('click', async (e) => {
      const id = e.target.getAttribute('data-remove-staff-id');
      if (!id) return;
      e.target.disabled = true;
      await apiPost('/api/remove-staff', { initData, id });
      loadStaffAndRender();
    });

    loadStaffAndRender();
  }

  async function loadStaffAndRender() {
    const listEl = document.getElementById('staffList');
    if (!listEl) return;
    const res = await apiPost('/api/staff-list', { initData });
    listEl.innerHTML = staffListHtml(res.ok ? res.staff : []);
  }

  // ---- Xodim (kassir/oshpaz/sklad/dostavka): oddiy rol ekrani ----
  function renderStaffScreen(roleLabel, restaurantName) {
    ekran(`
      <div class="panel" style="text-align:center;">
        <div class="salom">Salom!</div>
        <div class="kartochka">
          <div class="bosh" style="text-align:center; font-size:15px;">
            Siz <b>${escapeHtml(restaurantName || 'oshxona')}</b> jamoasida
          </div>
          <div style="text-align:center; margin-top:10px;">
            <span class="role-badge" style="font-size:14px; padding:8px 16px;">${escapeHtml(roleLabel)}</span>
          </div>
          <div class="bosh" style="text-align:center; margin-top:14px;">
            Sizning ish bo'limingiz tez orada shu yerga qo'shiladi.
          </div>
        </div>
      </div>
    `);
  }


  async function loadOwnProfileAndRender() {
    const res = await apiPost('/api/my-profile', { initData });
    if (res.ok && res.profile) renderProfileView(res.profile);
    else renderProfileForm(res.ok ? res.profile : null);
  }

  async function loadOwnersAndRender() {
    const res = await apiPost('/api/owners', { initData });
    renderAdminPanel(res.ok ? res.owners : []);
  }

  if (!tg || !initData) {
    // Oddiy brauzerdan yoki Telegram tashqarisidan ochilsa — kirish rad etiladi
    ekran('<div class="xato">Kirish rad etildi.<br>Bu ilova faqat Telegram orqali ishlaydi.</div>');
  } else {
    tg.ready();
    tg.expand();

    fetch('/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData })
    })
      .then(r => r.json())
      .then(data => {
        if (!data.ok) {
          ekran(`<div class="xato">Kirish rad etildi.<br>${escapeHtml(data.reason || 'Bu ilovaga ruxsatingiz yo\'q.')}</div>`);
          return;
        }
        if (data.isAdmin) {
          loadOwnersAndRender();
        } else if (data.isOwner) {
          loadOwnProfileAndRender();
        } else if (data.role) {
          renderStaffScreen(data.roleLabel, data.ownerRestaurantName);
        } else {
          ekran('<div class="xato">Kirish rad etildi.<br>Sizga ruxsat berilmagan.</div>');
        }
      })
      .catch(() => {
        ekran('<div class="xato">Xatolik yuz berdi.<br>Qaytadan urinib ko\'ring.</div>');
      });
  }
</script>
</body>
</html>
