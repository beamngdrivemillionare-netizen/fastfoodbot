<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .salom {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .xato {
    font-size: 16px;
    color: #d33;
    max-width: 320px;
    line-height: 1.5;
  }

  /* ---- Admin panel ---- */
  .panel {
    width: 100%;
    max-width: 420px;
    text-align: left;
  }
  .kartochka {
    background: var(--tg-theme-secondary-bg-color, #f2f2f7);
    border-radius: 14px;
    padding: 16px;
    margin-top: 20px;
  }
  .kartochka h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #ffffff);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:active { opacity: 0.85; }
  .btn.ikkinchi {
    background: transparent;
    border: 1px solid #ccc;
    color: var(--tg-theme-text-color, #111111);
  }
  .btn.xavfli {
    background: #e5484d;
  }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-row .btn { flex: 1; }

  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    margin-bottom: 10px;
  }

  .owner-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .owner-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--tg-theme-bg-color, #ffffff);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
  }
  .owner-item .owner-id { font-weight: 600; word-break: break-all; }
  .owner-item .owner-username { font-size: 12px; opacity: 0.6; }
  .owner-item button {
    border: none;
    background: none;
    color: #e5484d;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
  }
  .bosh { font-size: 13px; opacity: 0.6; margin-top: 4px; }
  .xabar { font-size: 13px; margin-top: 8px; min-height: 16px; }
  .xabar.ok { color: #2fa84f; }
  .xabar.err { color: #d33; }

  /* ---- Tasdiqlash oynasi (modal) ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  .modal {
    background: var(--tg-theme-bg-color, #ffffff);
    border-radius: 14px;
    padding: 20px;
    width: 100%;
    max-width: 340px;
    text-align: left;
  }
  .modal h3 { font-size: 16px; margin-bottom: 8px; }
  .modal p { font-size: 14px; opacity: 0.8; line-height: 1.4; margin-bottom: 16px; word-break: break-all; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"><div class="xato">Tekshirilmoqda...</div></div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  const appEl = document.getElementById('app');
  const initData = tg && tg.initData;

  function ekran(html) {
    appEl.innerHTML = html;
  }

  async function apiPost(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return r.json();
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---- Admin panelini chizish ----
  function renderAdminPanel(owners) {
    const ownersHtml = owners.length
      ? owners.map(o => `
          <div class="owner-item">
            <div>
              <div class="owner-id">${escapeHtml(o.id)}</div>
              ${o.username ? `<div class="owner-username">@${escapeHtml(o.username)}</div>` : ''}
            </div>
            <button data-remove-id="${escapeHtml(o.id)}">O'chirish</button>
          </div>
        `).join('')
      : `<div class="bosh">Hozircha do'kon egalari yo'q.</div>`;

    ekran(`
      <div class="panel">
        <div class="salom">Salom, admin</div>
        <div class="kartochka">
          <h2>Do'kon egasi qo'shish</h2>
          <input type="text" id="ownerInput" placeholder="Telegram ID, @username yoki t.me havolasi">
          <button class="btn" id="addOwnerBtn">Do'kon egasi qo'shish</button>
          <div class="xabar" id="addMsg"></div>
        </div>
        <div class="kartochka">
          <h2>Ruxsat berilgan do'kon egalari</h2>
          <div class="owner-list" id="ownerList">${ownersHtml}</div>
        </div>
      </div>
      <div class="overlay hidden" id="confirmOverlay">
        <div class="modal">
          <h3>Tasdiqlaysizmi?</h3>
          <p id="confirmText"></p>
          <div class="btn-row">
            <button class="btn ikkinchi" id="confirmCancel">Yo'q</button>
            <button class="btn" id="confirmOk">Ha, qo'shish</button>
          </div>
        </div>
      </div>
    `);

    document.getElementById('addOwnerBtn').addEventListener('click', () => {
      const val = document.getElementById('ownerInput').value.trim();
      const msgEl = document.getElementById('addMsg');
      msgEl.textContent = '';
      msgEl.className = 'xabar';
      if (!val) {
        msgEl.textContent = 'Iltimos, ID yoki username kiriting.';
        msgEl.className = 'xabar err';
        return;
      }
      document.getElementById('confirmText').textContent =
        `"${val}" ni do'kon egasi sifatida qo'shib, mini appga kirish huquqini berasizmi?`;
      document.getElementById('confirmOverlay').classList.remove('hidden');

      document.getElementById('confirmCancel').onclick = () => {
        document.getElementById('confirmOverlay').classList.add('hidden');
      };
      document.getElementById('confirmOk').onclick = async () => {
        document.getElementById('confirmOverlay').classList.add('hidden');
        msgEl.textContent = 'Qo\'shilmoqda...';
        msgEl.className = 'xabar';
        const res = await apiPost('/api/add-owner', { initData, input: val });
        if (res.ok) {
          msgEl.textContent = 'Muvaffaqiyatli qo\'shildi.';
          msgEl.className = 'xabar ok';
          document.getElementById('ownerInput').value = '';
          loadOwnersAndRender();
        } else {
          msgEl.textContent = res.reason || 'Xatolik yuz berdi.';
          msgEl.className = 'xabar err';
        }
      };
    });

    document.getElementById('ownerList').addEventListener('click', async (e) => {
      const id = e.target.getAttribute('data-remove-id');
      if (!id) return;
      e.target.disabled = true;
      await apiPost('/api/remove-owner', { initData, id });
      loadOwnersAndRender();
    });
  }

  async function loadOwnersAndRender() {
    const res = await apiPost('/api/owners', { initData });
    renderAdminPanel(res.ok ? res.owners : []);
  }

  if (!tg || !initData) {
    // Oddiy brauzerdan yoki Telegram tashqarisidan ochilsa — kirish rad etiladi
    ekran('<div class="xato">Kirish rad etildi.<br>Bu ilova faqat Telegram orqali ishlaydi.</div>');
  } else {
    tg.ready();
    tg.expand();

    fetch('/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData })
    })
      .then(r => r.json())
      .then(data => {
        if (!data.ok) {
          ekran(`<div class="xato">Kirish rad etildi.<br>${escapeHtml(data.reason || 'Bu ilovaga ruxsatingiz yo\'q.')}</div>`);
          return;
        }
        if (data.isAdmin) {
          loadOwnersAndRender();
        } else {
          ekran('<div class="salom">Salom</div>');
        }
      })
      .catch(() => {
        ekran('<div class="xato">Xatolik yuz berdi.<br>Qaytadan urinib ko\'ring.</div>');
      });
  }
</script>
</body>
</html>
